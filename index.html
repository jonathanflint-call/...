<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d0f14;
            color: #8a9ab5;
            font-family: 'Verdana', Geneva, Tahoma, sans-serif;
            font-size: 14px;
            line-height: 1.85;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 16px;
        }
        .container { width: 100%; max-width: 560px; }
        .story-text {
            background-color: #0a0c10;
            border: 1px solid #1e2535;
            padding: 28px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.95;
            color: #7a8fa8;
            min-height: 80px;
        }
        .choices { display: flex; flex-direction: column; gap: 8px; }
        .choice-btn {
            background-color: #0d1018;
            color: #607080;
            border: 1px solid #1a2030;
            padding: 14px 18px;
            font-size: 13px;
            font-family: 'Verdana', Geneva, Tahoma, sans-serif;
            cursor: pointer;
            text-align: left;
            line-height: 1.6;
            transition: background-color 0.15s, color 0.15s, border-color 0.15s;
        }
        .choice-btn:hover { background-color: #111520; color: #9aafc8; border-color: #2a3a50; }
        .choice-btn:active { background-color: #090b0f; }

        /* аудіо-плеєр */
        .audio-player {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding: 10px 14px;
            background-color: #080a0e;
            border: 1px solid #1a2535;
        }
        .audio-label { font-size: 11px; color: #3a5060; letter-spacing: 0.05em; flex: 1; }
        .audio-btn {
            background: none;
            border: 1px solid #2a3a50;
            color: #607080;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Verdana', Geneva, Tahoma, sans-serif;
            padding: 5px 10px;
            transition: color 0.15s, border-color 0.15s;
        }
        .audio-btn:hover { color: #9aafc8; border-color: #3a5070; }

        @media (max-width: 480px) {
            body { padding: 20px 10px; }
            .story-text { padding: 18px; font-size: 13px; }
            .choice-btn { padding: 12px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="story-text" id="story-text"></div>
    <div id="audio-container"></div>
    <div class="choices" id="choices"></div>
</div>

<script>
// ── АУДІО ──────────────────────────────────────────────
let currentAudio = null;

function stopAudio() {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
    }
    document.getElementById('audio-container').innerHTML = '';
}

function startAudio(url) {
    stopAudio();
    currentAudio = new Audio(url);
    currentAudio.loop = true;
    currentAudio.volume = 0.45;
    currentAudio.play().catch(() => {});

    const div = document.createElement('div');
    div.className = 'audio-player';

    const label = document.createElement('span');
    label.className = 'audio-label';
    label.textContent = '♪ музична скринька';

    const btn = document.createElement('button');
    btn.className = 'audio-btn';
    btn.textContent = 'пауза';
    let playing = true;

    btn.onclick = () => {
        if (playing) {
            currentAudio && currentAudio.pause();
            btn.textContent = 'грати';
        } else {
            currentAudio && currentAudio.play().catch(() => {});
            btn.textContent = 'пауза';
        }
        playing = !playing;
    };

    div.appendChild(label);
    div.appendChild(btn);
    document.getElementById('audio-container').appendChild(div);
}

// ── СЦЕНИ ──────────────────────────────────────────────
const scenes = {
    start: {
        text: "Ты приходишь в себя от резкого взрыва хлопушки. Это неприятно — громкий звук заставил бы даже закоренелого любителя веселья зажмуриться. Что ты и делаешь. Когда твои веки медленно поднимаются, ты понимаешь, что находишься в незнакомой комнате. Воздух пахнет сыростью. Ты замечаешь, как верхний правый угол стены под потолком слегка промок. Сквозь жалюзи в комнату пробивается приглушенный свет.",
        choices: [
            { text: "Моргнуть еще раз.", next: "scene1" },
            { text: "Глубоко задуматься.", next: "scene2" }
        ]
    },

    scene1: {
        text: "Ты моргаешь. А потом еще раз. Неприятная пелена на глазах никуда не исчезает, но ты, по крайней мере, понимаешь, что это место тебе точно незнакомо. Осталось...найти отсюда выход, наверное? Город за приоткрытыми жалюзями утвердительно гудит в ответ.",
        choices: [
            { text: "А, собственно, зачем это тебе?", next: "scene3" },
            { text: "Осмотреть комнату.", next: "scene4" }
        ]
    },

    scene2: {
        text: "Это было плохой идеей. Что-то в этой комнате кажется странным...Где-то вдалеке все еще слышится странный остаточный звон колокольчиков...Ты снова недоуменно моргаешь, медленно поворачивая голову. Странно, кажется, их нигде нет? Тебе все меньше нравится эта комната.",
        choices: [
            { text: "Наверное, раз уж ты здесь, стоит немного осмотреться.", next: "scene4" }
        ]
    },

    scene3: {
        text: "Резонно, и правда незачем. Ты закрываешь глаза на несколько минут и пытаешься не слушать глухой шум вокруг. Работает это из рук вон плохо — кроме того, спустя несколько минут, у тебя появляется навязчивое неприятное чувство в правой части затылка. Словно кто-то следит за тобой...Ты открываешь глаза и медленно оглядываешься. В комнате все еще никого нет — только ты сама, непонятные бумаги и большой кулер в углу, около двери.",
        choices: [
            { text: "Которая, кстати, сотрясается от стука.", next: "scene5" }
        ]
    },

    scene4: {
        text: "Ты опираешься рукой на стол и медленно поднимаешься со стула. Отлично, тебе, как минимум, ничего не болит. Комнатка совсем небольшая и выглядит...хм...за неимением лучших слов, выглядит она немного заброшенной. На столе разбросаны бумаги — впрочем, разбросаны они и по полу, и около небольшого кожаного дивана, и рядом с кулером у входа. Ты подходишь к окну и оттягиваешь жалюзи указательным пальцем. Кажется, ты на втором этаже. Люди размеренно движутся по улице — ты пытаешься присмотреться, чтобы понять, какой сейчас год, но сфокусироваться никак не получается. Ты опять слышишь странный звон, с которым проснулась...Твое внимание привлекает резкий стук в дверь, раздающийся у тебя за спиной.",
        choices: [
            { text: "Развернуться.", next: "scene5" }
        ]
    },

    scene5: {
        text: "Прежде, чем ты успеваешь сделать хотя бы шаг, дверь резко отворяется. Высокий мужчина с аккуратно собранными в хвост волосами смотрит на тебя с едва скрываемым раздражением. Ты успеваешь отметить, что он выглядит необычно. Его одежда точно не вписывается в твой потрепанный офис. Это что, китайская накидка? «Ваш офис невозможно найти. Неужели детективам платят настолько плохо?» Он заходит внутрь и закрывает за собой дверь. Ты не можешь избавиться от мысли, что он кого-то очень сильно тебе напоминает.",
        choices: [
            { text: "Я не детектив.", next: "scene6_a" },
            { text: "Я лучший следак в городе, но следы никогда не ведут к банку.", next: "scene6_a" },
            { text: "У вас настоящие волосы или это парик?", next: "scene6_a" },
            { text: "Конечно я вам помогу, извините, меня задержали дела.", next: "scene6_b" }
        ]
    },

    scene6_a: {
        text: "Он скептически поднимает бровь, никак не комментируя твои слова. Теперь ты уверена, что это Цзян Чэн — как ты вообще могла не понять сразу? Цзян Чэн вздыхает. «Конечно, чего я ожидал от детективов...Надеюсь, ваш коллега окажется посообразительнее — найти сразу двух идиотов было бы ужасным просчетом с моей стороны». Он разворачивается так же быстро, как и проскользнул в комнату — его рука опять лежит на ручке двери.",
        choices: [
            { text: "Подождите. Расскажите мне о деле.", next: "scene6_b" },
            { text: "Хорошо. Я вас слушаю.", next: "scene6_b" }
        ]
    },

    scene6_b: {
        text: "Цзян Чэн довольно кивает — в его глазах впервые с момента вашей встречи проскальзывает искорка одобрения. «Пойдемте скорее, моя мать уже начинает волноваться...поверьте, этого не хотелось бы ни мне, ни вам.» Он подходит к двери и нажимает на ручку, выходя первым. Ты недоуменно, полуавтоматически шагаешь следом, пытаясь запомнить все, что тебе удалось услышать. Что бы ни происходило — это лучше, чем дальше скучать в этой комнате.",
        choices: [
            { text: "Идти за ним.", next: "scene7" }
        ]
    },

    scene7: {
        text: "Ты оборачиваешься, чтобы закрыть дверь, но за твоей спиной ничего нет — ничего, кроме тихо шелестящей на ветру пшеницы. Вдалеке стоит дверь. Она кажется смутно знакомой. Может, именно через нее ты сюда и попала? В голове крутится навязчивая мысль, что именно это — твой путь к выходу. С такого расстояния ты можешь рассмотреть странный колокольчик, подвешенный на резную ручку. Ты слышишь тихий звон, когда с ним играет дикий полевой ветер. Этот звон тебе знаком — ты слышала его вместе с громким взрывом хлопушки.",
        choices: [
            { text: "Подойти к двери.", next: "scene7_fall" },
            { text: "Догнать Цзян Чэна.", next: "scene7_fall" }
        ]
    },

    scene7_fall: {
        text: "Ты делаешь шаг навстречу, но подойти ближе не получается — земля исчезает прямиком из-под твоих ног и ты чувствуешь, как куда-то проваливаешься. Чертова дверь с чертовыми загадками.",
        choices: [
            { text: "...", next: "scene8" }
        ]
    },

    scene8: {
        text: "Мир вокруг немного шатается. Ты чувствуешь, как ноги касаются неровного пола...пола ли? Ты открываешь глаза. Лодка. Покачивается медленно, почти убаюкивающе — если бы не запах реки и не Цзян Чэн, сидящий напротив с видом человека, которому давно надоело ждать.",
        choices: [
            { text: "Осмотреться.", next: "scene9" },
            { text: "Спросить, что происходит.", next: "scene9" }
        ]
    },

    scene9: {
        text: "«Это Жан, он будет помогать вам с расследованием...Хотя, вернее, вы помогаете ему» — Цзян Чэн бросает на вас очередной скептический взгляд. Рядом с тобой сидит невысокий мужчина в мятом пиджаке. «Ей, то, что я без делового костюма, не значит, что я плохой детектив!» Цзян Чэн не отвечает.",
        choices: [
            { text: "Осмотреть коллегу.", next: "scene9_look" },
            { text: "Спросить, что здесь происходит.", next: "scene9_case" }
        ]
    },

    scene9_look: {
        text: "Мятый пиджак, галстук чуть набок — это все тебе тоже знакомо. Кажется это именно тот самый Жан — что ж, ты пытаешься не думать об этом слишком много. Голова все еще болит.",
        choices: [
            { text: "Спросить, что здесь происходит.", next: "scene9_case" }
        ]
    },

    scene9_case: {
        text: "Жан скучающе смотрит на тебя, прежде чем бросить «Что ж, господин ... был прав, когда говорил что с вами...не все в порядке. Ничего, у меня есть опыт работы с такими...людьми. Буду краток, это началось три недели назад — сначала пропал один человек, потом второй. Вещи находили на берегу аккуратно сложенными — ботинки рядом с ботинками, черт возьми, как будто люди просто решили войти в воду и не вернуться. По ночам около реки собираются какие-то люди...поют что-то, но слов не разобрать.» Он замолкает, занятый попытками зажечь сигарету. Секунду в лодке царит тишина — пока Цзян Чэн тихо не добавляет «Рыбаки говорят, что рыба ушла — сети возвращаются пустыми уже две недели. Зато несколько человек видели что-то под водой...огромное, со сверкающей чешуей.»",
        choices: [
            { text: "Спросить про вещи на берегу.", next: "scene9_things" },
            { text: "Спросить про тех, кто пел.", next: "scene9_cult" },
            { text: "Огромная рыба — это уже интересно.", next: "scene9_fish" }
        ]
    },

    scene9_things: {
        text: "Жан опять вздыхает, бросая попытки высечь искру в этом холодном сыром воздухе. «Именно это меня и беспокоит больше всего. Вещи были сложены слишком аккуратно.» Цзян Чэн, уставившись вдаль, опять добавляет «Сегодня утром нашли еще один комплект...С бубенками? Какая глупость.» Ты молчишь, судорожно пытаясь сопоставить информацию.",
        choices: [
            { text: "Спросить про тех, кто пел.", next: "scene9_cult" },
            { text: "Спросить про рыбу.", next: "scene9_fish" }
        ]
    },

    scene9_cult: {
        text: "«Местные называют их культистами, но я бы не торопился с выводами» — Жан достает из кармана смятый листок с какими-то заметками. — «Их видели несколько раз, всегда ночью, всегда у самой воды. Никто не подходил близко...Ну, никто особо и не хотел.» «Пение было странным» — говорит Цзян Чэн, и это, кажется, первый раз, когда в его голосе появляется что-то, что не является раздражением.",
        choices: [
            { text: "Спросить про рыбу.", next: "scene9_fish" },
            { text: "Это звучит как проклятие.", next: "scene9_curse" }
        ]
    },

    scene9_fish: {
        text: "Жан пожимает плечами — сам он рыбу не видел. Впрочем, судя по всему, показания совпадают — несколько рыбаков независимо друг от друга описали одно и то же. «Я думаю, это просто крупный сом» — говорит Жан, но звучит это не очень убедительно. Цзян Чэн смотрит на воду.",

            { text: "Это звучит как проклятие.", next: "scene9_curse" },
            { text: "Сом. Конечно. Огромный светящийся сом.", next: "scene9_curse" }
        ]
    },

    scene9_curse: {
        text: "«Конечно» — заключает Цзян Чэн и смотрит на тебя с видом человека, который сам не очень верит в то, что только что сказал, но других версий пока нет. Тебе очень хочется с ним согласиться. Действительно чушь, наверное. Пропавшие люди, пустые сети, странные песни ночью — всему найдется рациональное объяснение. Должно найтись. Жан молчит, глядя на воду. Из его рта торчит сигарета, которую ему так и не удалось зажечь. За бортом темно и тихо. Тебе кажется, что даже вода прекратила движение. Странная река.",

            { text: "Это определенно чушь.", next: "scene10" },
            { text: "Наклониться и посмотреть на дно.", next: "scene10" }
        ]
    },

    scene10: {
        text: "Ты наклоняешься через борт, пытаясь рассмотреть что-нибудь в темной глубине. Только твое собственное отражение смотрит на тебя снизу. Вода на самом деле не слишком и мутная — тебе кажется, что ты отчетливо можешь разглядеть дно...Или что-то на дне. Черт, и правда. Ты прижмуриваешься и видишь на дне дверь. Ты узнаешь колокольчик, висящий на ручке. Ты наклоняешься чуть сильнее, чтобы убедиться...",
        choices: [

    scene10_fall: {

        choices: [
            { text: "Чертова дверь.", next: "scene11" }

    },

    scene11: {
        text: "Ты чувствуешь, как тебя резко дергают за руку. Твои легкие наполняются воздухом и ты начинаешь резко кашлять. Ты стоишь рядом с ведром, полным воды. Капли медленно стекают с твоих волос, пока ты пытаешься прийти в себя. «Повезло тем, кто уже отстрелялся...» — слышишь ты тихий голос рядом с собой и, поворачивая глаза, видишь мужчину, едва достающего тебе до пояса. На его лице приклеены смешные усы, а на голове возвышается невероятно внушительная шляпа. Он отвешивает тебе кивок, полный достоинства, и быстро шагает к кулисам. Погодите, куда тебя опять занесло?",
        choices: [
            { text: "Осмотреться вокруг.", next: "scene11_look" }
        ]
    },

    scene11_look: {
        text: "Не надо быть гением, чтобы понять, что ты сейчас в цирке. Из-за кулис в небольшое пыльное помещение, полное вещей и проталкивающихся мимо тебя людей, падает луч света. Вместе с ним до тебя долетают обрывки представления на сцене. Ты быстро окидываешь себя взглядом — слава богу, твоя одежда выглядит как обычно и тебе не придется выступать. Не очень-то и хотелось. Тихое хихиканье из угла заставляет тебя повернуться. Там, на нескольких застеленных ящиках, сидит...клоун? С такого расстояния хорошо не рассмотреть — но ты отчетливо видишь ярко-розовый нос и огромную копну волос.",
        choices: [
            { text: "Подойти ближе.", next: "scene11_clown" },
            { text: "К черту, тебе нечего здесь делать. Лучше поискать эту проклятую дверь сразу.", next: "scene11_door_search" }
        ]
    },

    scene11_door_search: {
        text: "Ты обводишь взглядом пространство за кулисами. Декорации, ящики, чьи-то забытые костюмы на вешалке...что ж, пока никакой двери с колокольчиком. Пока ты топчешься на месте, из угла снова доносится хихиканье. Кажется, просто так отсюда не выйти.",
        choices: [
            { text: "Ладно. Подойти к клоуну.", next: "scene11_clown" }
        ]

// ── НАВІГАЦІЯ ──────────────────────────────────────────
function goTo(sceneId) {
    const scene = scenes[sceneId];
    if (!scene) {
        console.error('Сцена не знайдена:', sceneId);
        return;
    }

    // аудіо
    if (scene.stopAudio) {
        stopAudio();
    } else if (scene.audio) {
        startAudio(scene.audio);
    }

    document.getElementById('story-text').textContent = scene.text;

    const choicesDiv = document.getElementById('choices');
    choicesDiv.innerHTML = '';
    scene.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice.text;
        btn.onclick = () => goTo(choice.next);
        choicesDiv.appendChild(btn);
    });
}
